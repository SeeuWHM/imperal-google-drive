<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Doc Reader — Pick Google Drive files</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 48px auto; padding: 0 16px; color: #1a1a1a; }
  button { font-size: 16px; padding: 10px 20px; cursor: pointer; }
  #result { margin-top: 24px; }
  textarea { width: 100%; height: 140px; font-family: monospace; font-size: 13px; }
  .hint { color: #555; font-size: 14px; }
  .file-row { padding: 6px 0; border-bottom: 1px solid #eee; }
</style>
</head>
<body>
  <h2>Doc Reader — pick files from Google Drive</h2>
  <p class="hint">
    Choose one or more files. Doc Reader will only ever be able to see files
    picked here — nothing else in your Drive.
  </p>
  <button id="start-btn" disabled>Loading Google Picker…</button>
  <div id="result" style="display:none">
    <h3>Picked <span id="count"></span> file(s)</h3>
    <div id="file-list"></div>
    <p class="hint">
      Copy the text below and tell Webby: <b>"register these files"</b>,
      pasting it along with the message.
    </p>
    <textarea id="payload" readonly></textarea>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const CLIENT_ID = params.get("client_id") || "";
  const API_KEY = params.get("api_key") || "";

  let tokenClient = null;
  let pickerLibLoaded = false;
  let gisLoaded = false;

  function maybeEnableButton() {
    if (pickerLibLoaded && gisLoaded) {
      const btn = document.getElementById("start-btn");
      btn.disabled = false;
      btn.textContent = "Choose files from Google Drive";
    }
  }

  function onGapiLoad() {
    gapi.load("picker", () => { pickerLibLoaded = true; maybeEnableButton(); });
  }

  function onGisLoad() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: "https://www.googleapis.com/auth/drive.file",
      callback: (resp) => {
        if (resp.error) {
          document.getElementById("start-btn").textContent = "Auth failed: " + resp.error + " (retry)";
          return;
        }
        createPicker(resp.access_token);
      },
    });
    gisLoaded = true;
    maybeEnableButton();
  }

  function createPicker(accessToken) {
    const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
      .setIncludeFolders(false)
      .setSelectFolderEnabled(false);
    const picker = new google.picker.PickerBuilder()
      .setDeveloperKey(API_KEY)
      .setOAuthToken(accessToken)
      .addView(view)
      .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
      .setCallback(onPicked)
      .build();
    picker.setVisible(true);
  }

  function onPicked(data) {
    if (data.action !== google.picker.Action.PICKED) return;
    const files = data.docs.map(d => ({
      file_id: d.id,
      name: d.name,
      mime_type: d.mimeType,
      size_bytes: parseInt(d.sizeBytes || "0", 10),
    }));
    document.getElementById("result").style.display = "block";
    document.getElementById("count").textContent = files.length;
    document.getElementById("file-list").innerHTML = files
      .map(f => `<div class="file-row">${f.name} — ${f.mime_type}</div>`)
      .join("");
    document.getElementById("payload").value = JSON.stringify({ files });
  }

  document.getElementById("start-btn").addEventListener("click", () => {
    tokenClient.requestAccessToken();
  });
</script>
<script async defer src="https://apis.google.com/js/api.js" onload="onGapiLoad()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="onGisLoad()"></script>
</body>
</html>
